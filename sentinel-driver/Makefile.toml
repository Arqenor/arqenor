[config]
default_to_workspace = false

[env]
CARGO_MAKE_EXTEND_WORKSPACE_MAKEFILE = true

# ── Build tasks ───────────────────────────────────────────────────────────────

[tasks.build-driver]
description = "Build the kernel driver in debug mode (requires WDK environment)"
command = "cargo"
args = ["wdk", "build", "-p", "sentinel-driver"]

[tasks.build-driver-release]
description = "Build the kernel driver in release mode"
command = "cargo"
args = ["wdk", "build", "-p", "sentinel-driver", "--release"]

[tasks.build-client]
description = "Build the userspace client library"
command = "cargo"
args = ["build", "-p", "sentinel-driver-client"]

[tasks.build-all]
description = "Build driver + client"
dependencies = ["build-driver", "build-client"]

# ── Signing tasks ─────────────────────────────────────────────────────────────

[tasks.sign-test]
description = "Sign with WDK test certificate (test signing VMs only)"
script = [
    "signtool sign /n \"WDK Test\" /fd sha256 /t http://timestamp.digicert.com target\\debug\\sentinel_driver.sys",
]

[tasks.stampinf]
description = "Run stampinf to process the .inx into a timestamped .inf"
script = [
    "stampinf -f driver\\sentinel_driver.inx -d * -v * -k 14.0",
]

[tasks.package]
description = "Create a .cab for attestation signing submission"
dependencies = ["build-driver-release", "stampinf"]
script = [
    "makecab /f driver\\sentinel_driver.ddf",
]

# ── Dev environment ───────────────────────────────────────────────────────────

[tasks.enable-test-signing]
description = "Enable test signing on the current machine (requires admin, reboot needed)"
script = [
    "bcdedit /set testsigning on",
    "echo Reboot required for test signing to take effect.",
]

[tasks.install-driver]
description = "Install the driver on the current machine (requires admin + test signing)"
script = [
    "sc.exe create SentinelDriver type= kernel start= demand binPath= \"%CD%\\target\\debug\\sentinel_driver.sys\"",
    "sc.exe start SentinelDriver",
]

[tasks.uninstall-driver]
description = "Stop and remove the driver"
script = [
    "sc.exe stop SentinelDriver",
    "sc.exe delete SentinelDriver",
]

[tasks.verifier-enable]
description = "Enable Driver Verifier for sentinel_driver.sys (standard settings)"
script = [
    "verifier /standard /driver sentinel_driver.sys",
    "echo Reboot required. Connect WinDbg before rebooting.",
]

[tasks.verifier-disable]
description = "Disable Driver Verifier"
script = ["verifier /reset"]
