[build]
target = "x86_64-pc-windows-msvc"

[target.x86_64-pc-windows-msvc]
# WDK requires the MSVC linker (link.exe) — do not use LLD
linker = "link.exe"
rustflags = [
    # Required for no_std kernel crates
    "-Z", "unstable-options",
]

[env]
# LLVM 17.0.6 required — LLVM 18 breaks WDK bindgen for ARM64
# Set LIBCLANG_PATH to the LLVM 17 install before building:
#   $env:LIBCLANG_PATH = "C:\Program Files\LLVM\bin"
LIBCLANG_PATH = { value = "C:\\Program Files\\LLVM\\bin", force = false }
