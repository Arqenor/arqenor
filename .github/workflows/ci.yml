name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  rust-fmt:
    name: Rust / rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain (rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  rust-clippy-linux:
    name: Rust / clippy + test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libbpf-dev libelf-dev zlib1g-dev \
            clang llvm pkg-config \
            linux-tools-common linux-tools-generic
          # ``bpftool`` lives in the kernel-specific package on GHA runners.
          sudo apt-get install -y "linux-tools-$(uname -r)" || true
      - name: Generate vmlinux.h for eBPF probes
        run: |
          if [ -r /sys/kernel/btf/vmlinux ] && command -v bpftool >/dev/null; then
            sudo bpftool btf dump file /sys/kernel/btf/vmlinux format c \
              > arqenor-ebpf/src/probes/vmlinux.h
          else
            echo "::warning::BTF vmlinux or bpftool missing — excluding arqenor-ebpf from clippy/test"
            echo "SKIP_EBPF=1" >> "$GITHUB_ENV"
          fi
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy --workspace
        run: |
          if [ "${SKIP_EBPF:-0}" = "1" ]; then
            cargo clippy --workspace --exclude arqenor-ebpf --all-targets -- -D warnings
          else
            cargo clippy --workspace --all-targets -- -D warnings
          fi
      - name: cargo test --workspace
        run: |
          if [ "${SKIP_EBPF:-0}" = "1" ]; then
            cargo test --workspace --exclude arqenor-ebpf --all-targets
          else
            cargo test --workspace --all-targets
          fi

  rust-check-windows:
    name: Rust / check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (exclude arqenor-ebpf — Linux-only)
        run: cargo check --workspace --exclude arqenor-ebpf --all-targets

  go:
    name: Go / vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: go/go.sum
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Install protoc Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Generate Go protobuf stubs
        run: |
          mkdir -p go/internal/grpc/generated
          protoc \
            --proto_path=proto \
            --go_out=go/internal/grpc/generated \
            --go_opt=paths=source_relative \
            --go-grpc_out=go/internal/grpc/generated \
            --go-grpc_opt=paths=source_relative \
            proto/common.proto \
            proto/host_analyzer.proto \
            proto/network_scanner.proto
      - name: gofmt
        working-directory: go
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needs to be run on:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        working-directory: go
        run: go vet ./...
      - name: go test
        working-directory: go
        run: go test -race -count=1 ./...
