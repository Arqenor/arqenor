name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  rust-fmt:
    name: Rust / rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain (rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  rust-clippy-linux:
    name: Rust / clippy + test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libbpf-dev libelf-dev zlib1g-dev \
            clang llvm pkg-config
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy --workspace
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test --workspace
        run: cargo test --workspace --all-targets

  rust-check-windows:
    name: Rust / check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (exclude arqenor-ebpf — Linux-only)
        run: cargo check --workspace --exclude arqenor-ebpf --all-targets

  go:
    name: Go / vet + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: go/go.sum
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needs to be run on:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -count=1 ./...
