name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default for every job; individual jobs (e.g. `audit`)
# expand this where they need to publish check-runs or upload artifacts.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  rust-fmt:
    name: Rust / rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install stable toolchain (rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  rust-clippy-linux:
    name: Rust / clippy + test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install stable toolchain (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install eBPF build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libbpf-dev libelf-dev zlib1g-dev \
            clang llvm pkg-config \
            linux-tools-common linux-tools-generic
          # ``bpftool`` lives in the kernel-specific package on GHA runners.
          sudo apt-get install -y "linux-tools-$(uname -r)" || true
      - name: Generate vmlinux.h for eBPF probes
        shell: bash {0}
        run: |
          # GHA runners ship a "bpftool" stub from linux-tools-common that
          # exits non-zero when no matching kernel package is installed.
          # Probe with ``bpftool version`` to detect a real installation.
          if [ -r /sys/kernel/btf/vmlinux ] && sudo bpftool version >/dev/null 2>&1; then
            if sudo bpftool btf dump file /sys/kernel/btf/vmlinux format c \
                 > arqenor-ebpf/src/probes/vmlinux.h; then
              echo "vmlinux.h generated ($(wc -l < arqenor-ebpf/src/probes/vmlinux.h) lines)"
              exit 0
            fi
          fi
          echo "::warning::BTF vmlinux or working bpftool missing — excluding arqenor-ebpf from clippy/test"
          echo "SKIP_EBPF=1" >> "$GITHUB_ENV"
          exit 0
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy --workspace
        run: |
          if [ "${SKIP_EBPF:-0}" = "1" ]; then
            cargo clippy --workspace --exclude arqenor-ebpf --all-targets -- -D warnings
          else
            cargo clippy --workspace --all-targets -- -D warnings
          fi
      - name: cargo test --workspace
        run: |
          if [ "${SKIP_EBPF:-0}" = "1" ]; then
            cargo test --workspace --exclude arqenor-ebpf --all-targets
          else
            cargo test --workspace --all-targets
          fi

  rust-check-windows:
    name: Rust / check (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (exclude arqenor-ebpf — Linux-only)
        run: cargo check --workspace --exclude arqenor-ebpf --all-targets

  go:
    name: Go / vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: go/go.sum
      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
      - name: Install protoc Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Generate Go protobuf stubs
        run: |
          mkdir -p go/internal/grpc/generated
          protoc \
            --proto_path=proto \
            --go_out=go/internal/grpc/generated \
            --go_opt=paths=source_relative \
            --go-grpc_out=go/internal/grpc/generated \
            --go-grpc_opt=paths=source_relative \
            proto/common.proto \
            proto/host_analyzer.proto \
            proto/network_scanner.proto
      - name: gofmt
        working-directory: go
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt needs to be run on:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        working-directory: go
        run: go vet ./...
      - name: go test
        working-directory: go
        run: go test -race -count=1 ./...

  # ─────────────────────────────────────────────────────────────
  # cargo-audit — RustSec advisory database scan
  # Non-blocking for first adoption (continue-on-error: true) —
  # we want signal, not a release blocker. Tighten by removing
  # continue-on-error once the workspace is clean and pinned.
  # ─────────────────────────────────────────────────────────────
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    continue-on-error: true
    # `rustsec/audit-check` publishes its findings as a check-run, which
    # requires `checks: write` on top of the default `contents: read`.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
