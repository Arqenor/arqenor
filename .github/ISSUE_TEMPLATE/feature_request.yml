name: Feature request
description: Suggest a new feature, detection, or improvement for Arqenor
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please check existing issues
        and the roadmap (`docs/roadmap/ROADMAP.md`) before filing.

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do that Arqenor does not currently support well?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? CLI flags, API shape, config keys, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Where does this feature belong?
      options:
        - Core / rules / pipeline
        - Platform collectors (Win / Lin / Mac)
        - CLI or TUI UX
        - gRPC / REST API
        - Go orchestrator
        - Docs
        - Other
    validations:
      required: true

  - type: checkboxes
    id: enterprise
    attributes:
      label: Open-core check
      options:
        - label: >
            I understand Arqenor is open-core and that features related to
            the Windows kernel driver, ML scorer, Tauri desktop app, cloud
            dashboard, or premium threat intel feeds belong in the
            `arqenor-enterprise` private repo.
          required: true
