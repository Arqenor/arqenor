version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      rust-minor-patch:
        update-types:
          - "minor"
          - "patch"
      rust-major:
        update-types:
          - "major"
      windows-ecosystem:
        patterns:
          - "windows"
          - "windows-*"
          - "wmi"
      tonic-prost-stack:
        patterns:
          - "tonic"
          - "tonic-*"
          - "prost"
          - "prost-*"
      ebpf-stack:
        patterns:
          - "libbpf-*"
          - "aya"
          - "aya-*"
    labels:
      - "dependencies"
      - "rust"

  - package-ecosystem: "gomod"
    directory: "/go"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      go-minor-patch:
        update-types:
          - "minor"
          - "patch"
      go-major:
        update-types:
          - "major"
    labels:
      - "dependencies"
      - "go"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions-all:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "ci"
